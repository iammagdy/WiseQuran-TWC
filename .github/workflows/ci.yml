name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pnpm-lockfile:
    name: Verify pnpm-lock.yaml matches package.json
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify pnpm lockfile is in sync with package.json
        run: |
          if ! pnpm install --frozen-lockfile --ignore-scripts; then
            echo ""
            echo "::error::pnpm-lock.yaml is out of sync with package.json."
            echo "::error::Run 'pnpm install' locally and commit the updated pnpm-lock.yaml."
            exit 1
          fi

  bundle-budget:
    name: Bundle size budget
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check bundle size budgets
        run: pnpm run check:bundle

  tests:
    name: Unit + E2E tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright browsers must be installed BEFORE `pnpm test:ci`,
      # which calls `playwright test`. We pin to chromium here because
      # Mobile Safari emulation in our config also runs through the
      # chromium-based WebKit driver shipped with Playwright; pulling
      # the full browser matrix doubles install time for no
      # additional coverage.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      # Runs `vitest run` then the full Playwright suite. The Sleep
      # Mode + Quran reader specs spy on HTMLMediaElement.play and
      # hard-assert at least one invocation after a Play tap — this is
      # the audio-play behavioural gate that catches "tap, nothing
      # happens" regressions.
      - name: Run unit + e2e tests
        run: pnpm run test:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
